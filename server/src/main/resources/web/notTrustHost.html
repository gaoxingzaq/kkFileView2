<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访问受限 - 不受信任的站点</title>
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .error-card {
            max-width: 600px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            text-align: center;
            padding: 40px 32px 48px;
            transition: transform 0.2s ease;
        }

        .error-card:hover {
            transform: translateY(-4px);
        }

        .icon-container {
            margin-bottom: 24px;
        }

        .icon-container img {
            width: 120px;
            height: 120px;
            display: inline-block;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 12px;
        }

        .host-warning {
            background: #fef2f2;
            border-left: 4px solid #dc2626;
            padding: 14px 20px;
            border-radius: 16px;
            margin: 24px 0;
            font-size: 18px;
            font-weight: 500;
            color: #1e293b;
        }

        .host-warning span {
            color: #dc2626;
            font-weight: 700;
            background: #fff0f0;
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-block;
            margin: 0 4px;
            word-break: break-all;
        }

        .message {
            color: #475569;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 28px;
        }

        .community-link {
            background: #f8fafc;
            border-radius: 24px;
            padding: 16px 20px;
            margin-top: 8px;
            border: 1px solid #e2e8f0;
        }

        .community-link p {
            font-size: 15px;
            color: #334155;
            margin-bottom: 10px;
        }

        .community-link a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .community-link a:hover {
            background: #2563eb;
        }

        .footer-note {
            margin-top: 28px;
            font-size: 13px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
<div class="error-card">
    <div class="icon-container">
        <!-- Base64 内嵌 SVG：安全盾牌 + 感叹号，风格简洁现代 -->
        <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2RjMjYyNiIgd2lkdGg9IjEyMCIgaGVpZ2h0PSIxMjAiPgogIDxwYXRoIGQ9Ik0xMiAyTDMgN3Y3YzAgNC41MSAzLjgyIDguNDUgOSAxMC4yNSA1LjE4LTEuOCA5LTUuNzQgOS0xMC4yNVY3bC05LTV6bS0yIDEzaC00di0yaDR2MnptMC0zaC00VjloNHYzek0xNiAxM2gtNHYtMmg0djJ6bTAtM2gtNFY4aDR2MnoiLz4KPC9zdmc+" alt="安全警告">
    </div>
    <h1>访问被拒绝</h1>
    <div class="host-warning">
        ⚠️ 预览源文件来自不受信任的站点：<span>${current_host}</span>
    </div>
    <div class="message">
        该站点不在系统信任列表中，为了您的数据安全，已阻止本次访问。<br>
    </div>
    <div class="community-link">
        <p>有任何疑问，欢迎加入 kk 开源社区知识星球咨询</p>
        <a href="https://t.zsxq.com/09ZHSXbsQ" target="_blank" rel="noopener noreferrer">
            🔗 加入知识星球
        </a>
    </div>
    <div class="footer-note">
        如有误判，请联系系统管理员更新信任主机配置
    </div>
</div>
</body>
</html>
