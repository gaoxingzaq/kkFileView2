<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访问受限 - 未授信目录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .error-card {
            max-width: 600px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            padding: 40px 32px 48px;
            transition: transform 0.2s ease;
        }

        .error-card:hover {
            transform: translateY(-4px);
        }

        .icon-container {
            margin-bottom: 24px;
        }

        .icon-container img {
            width: 120px;
            height: 120px;
            display: inline-block;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 12px;
        }

        .warning-message {
            background: #fef2f2;
            border-left: 4px solid #dc2626;
            padding: 20px;
            border-radius: 16px;
            margin: 24px 0;
            font-size: 18px;
            font-weight: 500;
            color: #1e293b;
        }

        .warning-message::before {
            content: "🚫 ";
            font-size: 20px;
        }

        .community-link {
            background: #f8fafc;
            border-radius: 24px;
            padding: 16px 20px;
            margin-top: 20px;
            border: 1px solid #e2e8f0;
        }

        .community-link p {
            font-size: 15px;
            color: #334155;
            margin-bottom: 10px;
        }

        .community-link a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .community-link a:hover {
            background: #2563eb;
        }

        .footer-note {
            margin-top: 28px;
            font-size: 13px;
            color: #94a3b8;
        }
    </style>
</head>
